<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTQL Theme Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.16);
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --accent:    #3b82f6;
      --accent-dim:rgba(59,130,246,0.18);
      --danger:    #ef4444;
      --success:   #22c55e;
      --radius:    12px;
      --radius-sm: 8px;
    }

    html { font-size: 13px; }

    body {
      width: 360px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(59,130,246,0.06) 0%, transparent 60%);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-logo svg { color: #fff; }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(59,130,246,0.25);
    }

    /* ===== LIVE PREVIEW ===== */
    .preview-wrap {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .preview-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .preview-box {
      width: 100%;
      height: 110px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      background-size: cover;
      background-position: center;
      transition: background-image 0.4s ease;
    }

    .preview-card {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 130px;
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }

    .preview-card-title {
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      transition: color 0.3s;
    }

    .preview-input {
      width: 100%;
      height: 22px;
      border-radius: 20px;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.3);
      margin-bottom: 6px;
    }

    .preview-btn {
      width: 100%;
      height: 22px;
      border-radius: 20px;
      border: none;
      transition: background 0.3s;
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      padding: 10px 16px 0;
      gap: 4px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 8px 4px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-btn svg { flex-shrink: 0; }

    /* ===== TAB PANELS ===== */
    .panels { position: relative; }

    .panel {
      display: none;
      padding: 14px 16px;
      flex-direction: column;
      gap: 14px;
    }

    .panel.active { display: flex; }

    /* ===== SECTION ===== */
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* ===== SLIDER CONTROL ===== */
    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .ctrl-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .ctrl-val {
      font-size: 11px;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      color: var(--accent);
      min-width: 48px;
      text-align: center;
    }

    .slider-track {
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 99px;
      background: var(--surface2);
      border: 1px solid var(--border);
      outline: none;
      cursor: pointer;
      accent-color: var(--accent);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 2.5px solid var(--accent);
      box-shadow: 0 2px 8px rgba(59,130,246,0.4);
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-webkit-slider-runnable-track {
      border-radius: 99px;
    }

    /* ===== COLOR PICKERS ===== */
    .color-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .color-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      transition: border-color 0.2s;
    }

    .color-item:hover { border-color: var(--border-hi); }

    .color-item-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .color-swatch-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-swatch-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .color-swatch-btn:hover {
      transform: scale(1.08);
      border-color: rgba(255,255,255,0.4);
    }

    .color-swatch-btn input[type="color"] {
      position: absolute;
      inset: -4px;
      width: calc(100% + 8px);
      height: calc(100% + 8px);
      opacity: 0;
      cursor: pointer;
    }

    .color-hex-display {
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
      font-weight: 600;
    }

    /* Color presets */
    .preset-colors {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .preset-color-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .preset-color-dot:hover {
      transform: scale(1.2);
      border-color: rgba(255,255,255,0.5);
    }

    .preset-color-dot.active {
      border-color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
    }

    /* ===== BACKGROUND TAB ===== */
    .bg-method-tabs {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px;
      gap: 2px;
    }

    .bg-method-btn {
      flex: 1;
      padding: 6px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .bg-method-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .bg-method-panel { display: none; }
    .bg-method-panel.active { display: block; }

    /* Upload area */
    .upload-area {
      border: 1.5px dashed var(--border-hi);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      margin-top: 10px;
    }

    .upload-area:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .upload-area.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: scale(1.01);
    }

    .upload-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
    }

    .upload-text { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .upload-sub  { font-size: 10px; color: var(--text-muted); }
    #file-input  { display: none; }

    /* URL input */
    .url-input-wrap { margin-top: 10px; position: relative; }

    .url-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 10px 80px 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--text-muted); }

    .url-apply-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: filter 0.2s;
    }

    .url-apply-btn:hover { filter: brightness(1.1); }

    /* Preset thumbnails */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .preset-thumb {
      aspect-ratio: 16/9;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      background-size: cover;
      background-position: center;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .preset-thumb::after {
      content: attr(data-name);
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 4px 6px 4px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      text-align: center;
    }

    .preset-thumb:hover { transform: scale(1.04); border-color: var(--border-hi); }
    .preset-thumb.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }

    /* Current bg info */
    .current-bg-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-top: 10px;
    }

    .current-bg-thumb {
      width: 48px;
      height: 32px;
      border-radius: 6px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: var(--surface2);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .current-bg-text { flex: 1; min-width: 0; }
    .current-bg-name { font-size: 11px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .current-bg-type { font-size: 10px; color: var(--text-muted); }

    .btn-clear-bg {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .btn-clear-bg:hover { border-color: var(--danger); color: var(--danger); }

    /* ===== FOOTER ===== */
    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-ghost:hover {
      border-color: var(--border-hi);
      color: var(--text);
    }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--danger);
    }

    .btn-danger:hover { background: rgba(239,68,68,0.2); }

    .btn-primary {
      flex: 1;
      justify-content: center;
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ===== STATUS TOAST ===== */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      z-index: 999;
      white-space: nowrap;
      opacity: 0;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success .toast-dot { background: var(--success); }
    .toast.error   .toast-dot { background: var(--danger);  }

    .toast-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ===== DIVIDER ===== */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 99px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
        </svg>
      </div>
      <div>
        <div class="header-title">HTQL Theme Studio</div>
        <div class="header-subtitle">CTU Login Customizer</div>
      </div>
    </div>
    <div class="header-badge">v1.3</div>
  </div>

  <!-- LIVE PREVIEW -->
  <div class="preview-wrap">
    <div class="preview-label">Xem trước giao diện</div>
    <div class="preview-box" id="preview-box">
      <div class="preview-card" id="preview-card">
        <div class="preview-card-title" id="preview-title">Đăng Nhập</div>
        <div class="preview-input"></div>
        <div class="preview-input"></div>
        <div class="preview-btn" id="preview-btn"></div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="glass" id="tab-glass">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M3 9h18M9 21V9"/></svg>
      Glass
    </button>
    <button class="tab-btn" data-tab="colors" id="tab-colors">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/><circle cx="8.5" cy="7.5" r="1.5"/><circle cx="6.5" cy="12.5" r="1.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 011.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      Màu sắc
    </button>
    <button class="tab-btn" data-tab="bg" id="tab-bg">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      Ảnh nền
    </button>
  </div>

  <!-- PANELS -->
  <div class="panels">

    <!-- GLASS PANEL -->
    <div class="panel active" id="panel-glass">
      <div>
        <div class="section-title">Độ trong suốt</div>
        <div class="ctrl-row">
          <span class="ctrl-label">Glass Opacity</span>
          <span class="ctrl-val" id="opacity-val">0.30</span>
        </div>
        <div class="slider-track">
          <input type="range" id="opacity-slider" min="0.05" max="0.95" step="0.05" value="0.3">
        </div>
      </div>

      <div>
        <div class="section-title">Độ nhòe (Blur)</div>
        <div class="ctrl-row">
          <span class="ctrl-label">Backdrop Blur</span>
          <span class="ctrl-val" id="blur-val">20px</span>
        </div>
        <div class="slider-track">
          <input type="range" id="blur-slider" min="0" max="60" step="2" value="20">
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-title">Preset nhanh</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-ghost" style="font-size:11px;padding:6px 12px;" data-preset-glass="0.15,8">Trong nhẹ</button>
          <button class="btn btn-ghost" style="font-size:11px;padding:6px 12px;" data-preset-glass="0.3,20">Cân bằng</button>
          <button class="btn btn-ghost" style="font-size:11px;padding:6px 12px;" data-preset-glass="0.55,30">Đục mờ</button>
          <button class="btn btn-ghost" style="font-size:11px;padding:6px 12px;" data-preset-glass="0.85,0">Rõ ràng</button>
        </div>
      </div>
    </div>

    <!-- COLORS PANEL -->
    <div class="panel" id="panel-colors">
      <div class="color-grid">
        <!-- Theme Color -->
        <div class="color-item">
          <div class="color-item-label">Màu chủ đề</div>
          <div class="color-swatch-row">
            <div class="color-swatch-btn" id="theme-color-swatch">
              <input type="color" id="theme-color" value="#152550">
            </div>
            <span class="color-hex-display" id="theme-color-hex">#152550</span>
          </div>
        </div>
        <!-- Text Color -->
        <div class="color-item">
          <div class="color-item-label">Màu chữ</div>
          <div class="color-swatch-row">
            <div class="color-swatch-btn" id="text-color-swatch">
              <input type="color" id="text-color" value="#1e293b">
            </div>
            <span class="color-hex-display" id="text-color-hex">#1E293B</span>
          </div>
        </div>
      </div>

      <div>
        <div class="section-title">Preset màu chủ đề</div>
        <div class="preset-colors" id="theme-presets">
          <div class="preset-color-dot" style="background:#152550" data-color="#152550" title="CTU Navy"></div>
          <div class="preset-color-dot" style="background:#1d4ed8" data-color="#1d4ed8" title="Royal Blue"></div>
          <div class="preset-color-dot" style="background:#0f766e" data-color="#0f766e" title="Teal"></div>
          <div class="preset-color-dot" style="background:#7c3aed" data-color="#7c3aed" title="Purple"></div>
          <div class="preset-color-dot" style="background:#b91c1c" data-color="#b91c1c" title="Red"></div>
          <div class="preset-color-dot" style="background:#b45309" data-color="#b45309" title="Amber"></div>
          <div class="preset-color-dot" style="background:#0e7490" data-color="#0e7490" title="Cyan"></div>
          <div class="preset-color-dot" style="background:#1e293b" data-color="#1e293b" title="Slate"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-title">Preset màu chữ</div>
        <div class="preset-colors" id="text-presets">
          <div class="preset-color-dot" style="background:#1e293b" data-color="#1e293b" title="Slate Dark"></div>
          <div class="preset-color-dot" style="background:#111827" data-color="#111827" title="Gray 900"></div>
          <div class="preset-color-dot" style="background:#1e3a5f" data-color="#1e3a5f" title="Navy Text"></div>
          <div class="preset-color-dot" style="background:#374151" data-color="#374151" title="Gray 700"></div>
          <div class="preset-color-dot" style="background:#064e3b" data-color="#064e3b" title="Emerald"></div>
          <div class="preset-color-dot" style="background:#ffffff" data-color="#ffffff" title="White"></div>
        </div>
      </div>
    </div>

    <!-- BACKGROUND PANEL -->
    <div class="panel" id="panel-bg">
      <!-- Method tabs -->
      <div>
        <div class="bg-method-tabs">
          <button class="bg-method-btn active" data-method="upload" id="method-upload">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            Tải lên
          </button>
          <button class="bg-method-btn" data-method="url" id="method-url">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            URL
          </button>
          <button class="bg-method-btn" data-method="presets" id="method-presets">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Preset
          </button>
        </div>

        <!-- Upload method -->
        <div class="bg-method-panel active" id="method-panel-upload">
          <label class="upload-area" for="file-input" id="upload-area">
            <div class="upload-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            </div>
            <div class="upload-text">Kéo thả hoặc click để chọn ảnh</div>
            <div class="upload-sub">PNG, JPG, WebP · Tối đa 4.5MB</div>
          </label>
          <input type="file" id="file-input" accept="image/*">
        </div>

        <!-- URL method -->
        <div class="bg-method-panel" id="method-panel-url">
          <div class="url-input-wrap">
            <input type="text" class="url-input" id="bg-url-input" placeholder="https://example.com/image.jpg">
            <button class="url-apply-btn" id="url-apply-btn">Áp dụng</button>
          </div>
        </div>

        <!-- Presets method -->
        <div class="bg-method-panel" id="method-panel-presets">
          <div class="preset-grid">
            <div class="preset-thumb" id="preset-default" data-name="CTU Campus" data-bg="default"
              style="background-image: url('background.png');"></div>
            <div class="preset-thumb" data-name="Dark City" data-bg="https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=1200&auto=format&fit=crop&q=80"
              style="background-image: url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=150&q=60');"></div>
            <div class="preset-thumb" data-name="Forest" data-bg="https://images.unsplash.com/photo-1448375240586-882707db888b?w=1200&auto=format&fit=crop&q=80"
              style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?w=150&q=60');"></div>
            <div class="preset-thumb" data-name="Abstract" data-bg="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200&auto=format&fit=crop&q=80"
              style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150&q=60');"></div>
            <div class="preset-thumb" data-name="Ocean" data-bg="https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1200&auto=format&fit=crop&q=80"
              style="background-image: url('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=150&q=60');"></div>
            <div class="preset-thumb" data-name="Mountains" data-bg="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&auto=format&fit=crop&q=80"
              style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=150&q=60');"></div>
          </div>
        </div>
      </div>

      <!-- Current Background Info -->
      <div class="current-bg-info" id="current-bg-info">
        <div class="current-bg-thumb" id="current-bg-thumb"></div>
        <div class="current-bg-text">
          <div class="current-bg-name" id="current-bg-name">CTU Campus (Mặc định)</div>
          <div class="current-bg-type" id="current-bg-type">Preset tích hợp</div>
        </div>
        <button class="btn-clear-bg" id="btn-clear-bg" title="Xóa ảnh nền">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button class="btn btn-danger" id="btn-reset">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Reset
    </button>
    <button class="btn btn-primary" id="btn-close">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      Đóng
    </button>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span id="toast-text"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
